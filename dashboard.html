<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lelang Jadwal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #4361ee; --secondary: #2ec4b6; --bg: #f8f9fa; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #2b3445; }
    .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    .btn-primary { background: var(--primary); border: none; border-radius: 12px; padding: 12px; font-weight: 600; }
    .btn-success { background: var(--secondary); border: none; border-radius: 12px; }
    .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e3e9ef; }
</style>

    <style>
        /* Mengganti Font Bawaan */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa; /* Warna background abu-abu sangat muda */
            color: #2b3445;
        }

        /* Mempercantik Kartu (Card) */
        .card {
            border: none !important;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek Melayang saat Kartu Disentuh Mouse */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* Mempercantik Input Form */
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e3e9ef;
            background-color: #fbfbfc;
        }
        
        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.15);
        }

        /* Mempercantik Tombol Primary */
        .btn-primary {
            background-color: #4361ee; /* Biru Startup */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #3a53d0;
            transform: scale(1.02);
        }

        /* Mempercantik Tombol Success */
        .btn-success {
            background-color: #2ec4b6; /* Tosca Segar */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
        }

        .btn-success:hover {
            background-color: #28ab9f;
        }

        /* Navbar Kustom (Kalau ada) */
        .navbar {
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
            background-color: #ffffff !important;
        }
    </style>

</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">Casper Learning</a>
            <div class="d-flex">
                <a href="lapor.html" class="btn btn-outline-light btn-sm me-2 fw-bold">📝 Lapor Kelas</a>
                <button class="btn btn-danger btn-sm fw-bold">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-4">Halo, Tutor! 👋 <br>
            <small class="text-muted fs-6">Berikut jadwal lelang yang tersedia untuk diambil:</small>
        </h4>

        <div class="row" id="jadwalContainer">

        </div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TODO: PASTE FIREBASE CONFIG MILIKMU DI SINI JUGA
        const firebaseConfig = {
            // ... (Samakan dengan yang di index.html)
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fungsi untuk mengambil data jadwal dari database
        async function tampilkanJadwal() {
            const container = document.getElementById('jadwalContainer');
            container.innerHTML = '<p class="text-center">Memuat jadwal lelang...</p>'; // Loading state

            try {
                // Mengambil koleksi bernama "jadwal_lelang" dari Firebase
                const querySnapshot = await getDocs(collection(db, "jadwal_lelang"));
                container.innerHTML = ''; // Bersihkan tulisan loading

                if (querySnapshot.empty) {
                    container.innerHTML = '<p class="text-center text-muted">Belum ada jadwal yang tersedia saat ini.</p>';
                    return;
                }

                // Looping data dan bikin elemen kartu HTML
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = `
                        <div class="col-md-6 col-lg-4 mb-3">
                            <div class="card shadow-sm h-100 border-0">
                                <div class="card-body">
                                    <span class="badge bg-success mb-2">Tersedia</span>
                                    <h5 class="card-title fw-bold text-dark">${data.pelajaran}</h5>
                                    <p class="card-text mb-1 text-secondary">📅 ${data.tanggal}</p>
                                    <p class="card-text mb-3 text-secondary">⏰ ${data.waktu}</p>
                                    <button class="btn btn-primary w-100 fw-bold" onclick="alert('Fitur ambil kelas segera hadir!')">Ambil Kelas</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error("Gagal mengambil data: ", error);
                container.innerHTML = '<p class="text-danger text-center">Gagal memuat jadwal. Pastikan koneksi dan database aman.</p>';
            }
        }

        // Jalankan fungsi saat halaman dibuka
        tampilkanJadwal();
    </script>   
    
    <div class="card mb-3 p-3">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-bold mb-1">Matematika - SMA Kelas 12</h5>
            <p class="text-muted mb-0"><i class="bi bi-calendar"></i> Besok, 16:00 WIB</p>
        </div>
        <div class="text-end">
            <h5 class="text-success fw-bold mb-1">Rp 75.000</h5> <button class="btn btn-primary btn-sm">Ambil Kelas</button>
        </div>
    </div>
</div>

</body>
</html>
