<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Tutor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #4361ee; --secondary: #2ec4b6; --bg: #f8f9fa; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #2b3445; }
    .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    .btn-primary { background: var(--primary); border: none; border-radius: 12px; padding: 12px; font-weight: 600; }
    .btn-success { background: var(--secondary); border: none; border-radius: 12px; }
    .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e3e9ef; }
</style>

    <style>
        /* Mengganti Font Bawaan */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa; /* Warna background abu-abu sangat muda */
            color: #2b3445;
        }

        /* Mempercantik Kartu (Card) */
        .card {
            border: none !important;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek Melayang saat Kartu Disentuh Mouse */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* Mempercantik Input Form */
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e3e9ef;
            background-color: #fbfbfc;
        }
        
        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.15);
        }

        /* Mempercantik Tombol Primary */
        .btn-primary {
            background-color: #4361ee; /* Biru Startup */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #3a53d0;
            transform: scale(1.02);
        }

        /* Mempercantik Tombol Success */
        .btn-success {
            background-color: #2ec4b6; /* Tosca Segar */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
        }

        .btn-success:hover {
            background-color: #28ab9f;
        }

        /* Navbar Kustom (Kalau ada) */
        .navbar {
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
            background-color: #ffffff !important;
        }
    </style>
   
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">Login Tutor Casper</h3>
            <p class="text-center text-muted mb-4">Silakan login</p>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Tutor</label>
                    <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Masuk</button>
            </form>
            
        </div>
    </div>

<script type="module">
        // Import Firebase dari internet (CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
        apiKey: "AIzaSyBW4UcmFjgsNvZiXhqajvYBp1qxt4fNyTc",
        authDomain: "portal-tutor-casper.firebaseapp.com",
        projectId: "portal-tutor-casper",
        storageBucket: "portal-tutor-casper.firebasestorage.app",
        messagingSenderId: "825179378295",
        appId: "1:825179378295:web:fb112ec8a35c344816ec72",
        measurementId: "G-1EK8TQQ786"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Menangkap aksi saat tombol login ditekan
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Mencegah halaman reload
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Proses Login ke Firebase
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Login Berhasil! Selamat datang.");
                    window.location.href = "dashboard.html"; // Pindah ke dashboard
                })
                .catch((error) => {
                    alert("Login Gagal: Cek kembali email dan password!");
                    console.error(error.message);
                });
        });
    </script>
</body>
</html>
