<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lelang Jadwal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Mengganti Font Bawaan */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa; /* Warna background abu-abu sangat muda */
            color: #2b3445;
        }

        /* Mempercantik Kartu (Card) */
        .card {
            border: none important;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek Melayang saat Kartu Disentuh Mouse */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* Mempercantik Input Form */
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e3e9ef;
            background-color: #fbfbfc;
        }
        
        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.15);
        }

        /* Mempercantik Tombol Primary */
        .btn-primary {
            background-color: #4361ee; /* Biru Startup */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #3a53d0;
            transform: scale(1.02);
        }

        /* Mempercantik Tombol Success */
        .btn-success {
            background-color: #2ec4b6; /* Tosca Segar */
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
        }

        .btn-success:hover {
            background-color: #28ab9f;
        }

        /* Navbar Kustom (Kalau ada) */
        .navbar {
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
            background-color: #ffffff limportant;
        }
    </style>

</head>
<body class="bg-light">

        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">📚 Bank Materi Casper</h2>
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Kembali</a>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card h-100 p-4">
                        <h5 class="fw-bold color-primary">📖 Kurikulum Merdeka (SMA)</h5>
                        <ul class="list-group list-group-flush mt-3">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Matematika Fase F
                                <a href="#" class="btn btn-sm btn-primary">Buka Drive</a>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Fisika Fase F
                                <a href="#" class="btn btn-sm btn-primary">Buka Drive</a>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card h-100 p-4 border-warning">
                        <h5 class="fw-bold text-warning">🏆 Persiapan Olimpiade (OSN)</h5>
                        <ul class="list-group list-group-flush mt-3">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Silabus KSN Matematika
                                <a href="#" class="btn btn-sm btn-warning text-white">Buka</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
